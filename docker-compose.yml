services:
  app:
    image: imperissoft/grpbama:latest
    restart: unless-stopped
    user: root
    working_dir: /var/www

    # ✅ Commande simplifiée - migrations à exécuter manuellement
    # Le script start.sh gère tout au démarrage

    # ✅ Variables d'environnement pour production
    environment:
      - APP_NAME=Groupe Bama
      - APP_ENV=production
      - APP_KEY=base64:giZ9L2WKCeJlJ/MazMA3C3TCozQtL+sIgZyEZd+LeaY=
      - APP_DEBUG=false
      - APP_URL=https://groupe-bama-ged.imperis.com
      - APP_LOCALE=en
      - APP_FALLBACK_LOCALE=en
      - APP_FAKER_LOCALE=en_US
      - APP_MAINTENANCE_DRIVER=file
      - BCRYPT_ROUNDS=12
      - LOG_CHANNEL=stack
      - LOG_DEPRECATIONS_CHANNEL=null
      - LOG_LEVEL=error

      # ✅ Configuration DB - Port interne Docker (3306)
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=groupebama
      - DB_USERNAME=root
      - DB_PASSWORD=dbimperis123@78

      # ✅ Sessions - Domain sans protocole
      - SESSION_DRIVER=file
      - SESSION_LIFETIME=120
      - SESSION_ENCRYPT=false
      - SESSION_PATH=/
      - SESSION_DOMAIN=groupe-bama-ged.imperis.com
      - SESSION_SECURE_COOKIE=true
      - SESSION_SAME_SITE=lax

      - BROADCAST_CONNECTION=log
      - FILESYSTEM_DISK=minio

      # ✅ Queue en mode sync (pas de worker nécessaire)
      - QUEUE_CONNECTION=sync

      - CACHE_STORE=file
      - CACHE_DRIVER=file

      - MAIL_MAILER=log
      - MAIL_FROM_ADDRESS=infos@groupe-bama-ged.imperis.com
      - MAIL_FROM_NAME=Groupe Bama

      - VITE_APP_NAME=Groupe Bama

      - AWS_ACCESS_KEY_ID=idADMIN
      - AWS_SECRET_ACCESS_KEY=idADMIN78
      - AWS_DEFAULT_REGION=us-east-1
      - AWS_BUCKET=groupebama
      - AWS_URL=https://api.storage.imperis.com
      - AWS_ENDPOINT=https://api.storage.imperis.com
      - AWS_USE_PATH_STYLE_ENDPOINT=true

    volumes:
      - storage_data:/var/www/storage
      - cache_data:/var/www/bootstrap/cache
      - public_assets:/var/www/public

    networks:
      - db_mysql_mynetwork
      - laravel_network

    # ✅ Healthcheck pour vérifier PHP-FPM
    healthcheck:
      test: ["CMD-SHELL", "php-fpm -t 2>&1 | grep -q 'test is successful' && echo ok || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 60s

  web:
    image: nginx:1.25-alpine
    container_name: grpbama_nginx
    restart: unless-stopped
    ports:
      - "8786:80"
    volumes:
      - public_assets:/var/www/public:ro
      - /root/grpbama/docker/nginx/app.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - laravel_network

    # ✅ Healthcheck Nginx
    healthcheck:
      test: [ "CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost/ || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  storage_data:
  cache_data:
  public_assets:


networks:
  laravel_network:
    driver: bridge
  db_mysql_mynetwork:
    external: true
